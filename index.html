<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GhostApp 👻 - Fix Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0f; --surface: #16161f; --border: #1e1e2e;
    --text: #ffffff; --text2: #c0c0e0; --text3: #44445a;
    --purple: #7c5cff; --teal: #20c9a0; --red: #ff4d6d; --orange: #ff9f1c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  #app { height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
  .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: var(--bg); }
  .screen.active { display: flex; }
  .scroll-area { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }
  .topbar { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; }
  .back-btn { width: 35px; height: 35px; background: var(--surface); border-radius: 50%; border: 1px solid var(--border); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  
  /* Kartlar ve Menü */
  .menu-card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 10px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
  
  /* API Kurulum Alanı - Önemli */
  #api-setup-container { background: #1a1505; border: 1px solid var(--orange); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
  .api-input { width: 100%; background: #000; border: 1px solid var(--orange); padding: 12px; color: white; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
  
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; resize: none; }
  .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; font-family: 'Syne'; }
  .btn-purple { background: var(--purple); color: white; }
  .btn-teal { background: var(--teal); color: black; }
  .error-msg { background: #2a1010; color: var(--red); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; display: none; border: 1px solid var(--red); }
  .result-box { background: #10101a; border: 1px solid var(--purple); padding: 15px; border-radius: 12px; margin-top: 15px; line-height: 1.6; white-space: pre-wrap; display: none; }
  
  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #050505; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
  .nav-item { color: var(--text3); font-size: 11px; text-align: center; cursor: pointer; }
  .nav-item.active { color: var(--purple); }
</style>
</head>
<body>

<div id="app">
  <div id="home" class="screen active">
    <div style="padding: 60px 25px 20px;">
        <h1 style="font-family:'Syne'; font-size: 40px;">GhostApp 👻</h1>
        <p style="color:var(--text3)">Hafıza sıfırlandı, yeniden başla.</p>
    </div>
    <div class="menu-card" onclick="navigate('ghostlog')"><span>👻</span> <div><b>GhostLog</b><br><small>Analiz Et</small></div></div>
    <div class="menu-card" onclick="navigate('lastseen')"><span>🕐</span> <div><b>Last Seen</b><br><small>Simüle Et</small></div></div>
  </div>

  <div id="ghostlog" class="screen">
    <div class="topbar"><div class="back-btn" onclick="navigate('home')">←</div> <h2 style="font-family:'Syne'">GhostLog</h2></div>
    <div class="scroll-area">
      <div id="api-setup-container">
        <p style="font-size:12px; color:var(--orange); margin-bottom:8px;">⚠️ Google Gemini API Key Girin:</p>
        <input type="text" id="api-key-field" class="api-input" placeholder="AIzaSy... ile başlar">
        <button class="btn btn-teal" style="padding:8px" onclick="saveNewKey()">ANAHTARI KAYDET</button>
      </div>

      <div class="card">
        <textarea id="gl-input" rows="5" placeholder="Neler oldu? Anlat..."></textarea>
        <button class="btn btn-purple" id="gl-btn" onclick="runAI('gl')">ANALİZ ET</button>
      </div>
      <div id="gl-error" class="error-msg"></div>
      <div id="gl-result" class="result-box"></div>
    </div>
  </div>

  <div id="lastseen" class="screen">
    <div class="topbar"><div class="back-btn" onclick="navigate('home')">←</div> <h2 style="font-family:'Syne'">Last Seen</h2></div>
    <div class="scroll-area">
      <div class="card">
        <textarea id="ls-input" rows="4" placeholder="Ona ne yazdın?"></textarea>
        <button class="btn btn-teal" id="ls-btn" onclick="runAI('ls')">NE CEVAP VERİRDİ?</button>
      </div>
      <div id="ls-error" class="error-msg"></div>
      <div id="ls-result" class="result-box"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="navigate('home')">🏠<br>Ana Sayfa</div>
    <div class="nav-item" onclick="navigate('ghostlog')">👻<br>GhostLog</div>
    <div class="nav-item" onclick="navigate('lastseen')">🕐<br>Simulator</div>
  </div>
</div>

<script>
// 1. ZORLA SIFIRLAMA (BRUTE FORCE)
// Sayfa her açıldığında eğer anahtar hatalıysa temizle
if (localStorage.getItem('ghost_gemini_key') === null || localStorage.getItem('ghost_gemini_key') === "null" || localStorage.getItem('ghost_gemini_key').length < 5) {
    localStorage.clear();
    console.log("Hafıza temizlendi.");
}

let API_KEY = localStorage.getItem('ghost_gemini_key') || "";

// 2. NAVİGASYON
function navigate(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    // API kutusunu sadece anahtar yoksa göster
    const apiBox = document.getElementById('api-setup-container');
    if (API_KEY) {
        apiBox.style.display = "none";
    } else {
        apiBox.style.display = "block";
    }
}

// 3. ANAHTAR KAYDETME
function saveNewKey() {
    const val = document.getElementById('api-key-field').value.trim();
    if (val.length < 10) {
        alert("Lütfen geçerli bir anahtar girin.");
        return;
    }
    localStorage.setItem('ghost_gemini_key', val);
    API_KEY = val;
    alert("Anahtar başarıyla kaydedildi! Şimdi uygulamayı kullanabilirsin.");
    navigate('ghostlog'); // Sayfayı yenilemiş gibi yap
}

// 4. YAPAY ZEKA ÇAĞRISI
async function runAI(type) {
    if (!API_KEY) {
        alert("Önce API anahtarını girip kaydetmelisin!");
        return;
    }

    const input = document.getElementById(type + '-input').value.trim();
    const btn = document.getElementById(type + '-btn');
    const resultBox = document.getElementById(type + '-result');
    const errorBox = document.getElementById(type + '-error');

    if (!input) return;

    // Reset UI
    errorBox.style.display = "none";
    resultBox.style.display = "none";
    btn.disabled = true;
    btn.innerText = "Yapay Zeka Düşünüyor...";

    try {
        const prompt = type === 'gl' 
            ? `Bir ghosting uzmanı olarak şu hikayeyi analiz et ve neden ghostlandığını söyle: ${input}`
            : `Ghostlayan birinin ağzından şu mesaja soğuk bir cevap yaz: ${input}`;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error?.message || "API Hatası oluştu.");
        }

        const aiText = data.candidates[0].content.parts[0].text;
        resultBox.innerText = aiText;
        resultBox.style.display = "block";

    } catch (err) {
        errorBox.innerText = "Hata: " + err.message;
        errorBox.style.display = "block";
        if (err.message.includes("API key not valid")) {
            localStorage.removeItem('ghost_gemini_key');
            API_KEY = "";
            setTimeout(() => alert("Anahtar geçersiz olduğu için silindi. Lütfen yeni anahtar girin."), 500);
        }
    } finally {
        btn.disabled = false;
        btn.innerText = type === 'gl' ? "ANALİZ ET" : "NE CEVAP VERİRDİ?";
    }
}
</script>

</body>
</html>
